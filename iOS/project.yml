name: Patiowatch
options:
  bundleIdPrefix: com.shimondeitel.patiowatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Patiowatch:
    type: application
    platform: iOS
    sources:
      - path: Patiowatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.patiowatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Patiowatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PatiowatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PatiowatchTests
      - path: Patiowatch.storekit
    dependencies:
      - target: Patiowatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.patiowatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PatiowatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PatiowatchUITests
    dependencies:
      - target: Patiowatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.patiowatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Patiowatch:
    build:
      targets:
        Patiowatch: all
        PatiowatchTests: [test]
        PatiowatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Patiowatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Patiowatch.storekit
      targets:
        - PatiowatchTests
        - PatiowatchUITests
    archive:
      config: Release
